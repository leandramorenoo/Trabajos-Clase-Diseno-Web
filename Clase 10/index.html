    <!--FORMULARIO EJEMPLO-->

    <form class="reservation" action="#" method="GET">

        <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Name">
        </div>

        <div class="field">
            <label for="surname">Surname</label>
            <input id="surname" name="surname" type="text" placeholder="Surname">
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Email">
        </div>

        <fieldset>
            <legend>Reservation</legend>
            <div class="field">
                <label for="date">Date</label>
                <input id="date" name="date" type="date">
            </div>

            <div class="field">
                <label for="hour">Hour</label>
                <input id="hour" name="hour" type="time">
            </div>
        </fieldset>

        <div class="field field--acceptance">
            <input name="acceptance" id="acceptance" required type="checkbox">
            <label for="acceptance">He leido y acepto las politicas de privacidad.</label>   
        </div>

        <button class="form__submit" type="submit">
            Send
            <i class="ri-mail-line"></i>
        </button>

    </form>
